services:
  postgres:
    image: postgres:16-alpine
    container_name: rentrent-postgres
    environment:
      POSTGRES_USER: rentrent
      POSTGRES_PASSWORD: rentrent
      POSTGRES_DB: rentrent
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U rentrent -d rentrent']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
